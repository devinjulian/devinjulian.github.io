<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta
      name="description"
      content="Algo Trading Center — automation that buys back your hours. Real algorithms, verifiable live results."
    />
    <title>Algo Trading Center — The Time Capitalist</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />

    <!-- Social preview. og:image is most reliable as an ABSOLUTE url — once the
         domain is known, set these to https://<username>.github.io/og.png and add og:url. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Algo Trading Center" />
    <meta property="og:title" content="Algo Trading Center — The Time Capitalist" />
    <meta
      property="og:description"
      content="Automation that buys back your hours. Real algorithms with verifiable live results."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Algo Trading Center — The Time Capitalist" />
    <meta
      name="twitter:description"
      content="Automation that buys back your hours. Real algorithms with verifiable live results."
    />
    <meta name="twitter:image" content="/og.png" />
    <!-- SPA path restore for GitHub Pages deep links (pairs with public/404.html). https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
