<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Algo Trading Center</title>
    <!-- GitHub Pages SPA fallback: encode the path into a query and bounce to index.html,
         which restores it via the snippet in index.html. https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      // User/org site served at the domain root → keep zero path segments.
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
