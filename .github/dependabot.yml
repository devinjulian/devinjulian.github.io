version: 2
updates:
  # npm dependencies (Vite, React, three.js, etc.)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the Pages deploy workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
